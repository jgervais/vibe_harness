name: Release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build
        run: |
          RULES_HASH=$(sha256sum internal/rules/registry.go | cut -d' ' -f1)
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME#v} -X main.rulesHash=${RULES_HASH}" \
            -o vibe-harness_linux_amd64 ./cmd/vibe-harness
      - name: Package
        run: |
          mkdir -p dist
          tar czf dist/vibe-harness_linux_amd64.tar.gz \
            vibe-harness_linux_amd64 README.md LICENSE install.sh
          sha256sum dist/*.tar.gz > dist/checksums.txt
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
