builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.rulesHash={{.Env.RULES_HASH}}
    main: ./cmd/vibe-harness
    binary: vibe-harness

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: jgervais
    name: vibe_harness