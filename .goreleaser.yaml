version: 2
project_name: vibe-harness

before:
  hooks:
    - go mod tidy

builds:
  - binary: vibe-harness
    main: ./cmd/vibe-harness
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.rulesHash={{ .Env.RULES_HASH }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: jgervais
    name: vibe_harness
