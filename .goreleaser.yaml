version: 2
project_name: vibe-harness

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/vibe-harness
    env:
      - CGO_ENABLED=1
    goos: [linux]
    goarch: [amd64]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.rulesHash={{ .Env.RULES_HASH }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: jgervais
    name: vibe_harness
